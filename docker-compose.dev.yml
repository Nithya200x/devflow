services:
  postgres:
    image: postgres:15-alpine
    container_name: devflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devflow}
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devflow}
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: devflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    group_add:
      - "0"
    volumes:
      - devflow_db:/database
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}\.minikube:/.minikube:ro
      - ./monitoring/kubeconfig-docker.yml:/.kube/kubeconfig-docker.yml:ro
    environment:
      KUBECONFIG: /.kube/kubeconfig-docker.yml
      FLASK_ENV: development
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-devflow-super-secret-key-change-in-prod}
      DATABASE_URL: ${DATABASE_URL:-postgresql://devflow:devflow@postgres:5432/devflow}
      DOCKER_HOST: unix:///var/run/docker.sock
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      GRAFANA_URL: ${GRAFANA_URL:-http://grafana:3000}
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-}
      ALERTMANAGER_URL: ${ALERTMANAGER_URL:-http://alertmanager:9093}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: devflow-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devflow_net

  prometheus:
    image: prom/prometheus:latest
    container_name: devflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus-alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devflow_net

  grafana:
    image: grafana/grafana:latest
    container_name: devflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-devflow}
      GF_INSTALL_PLUGINS: ""
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - devflow_net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: devflow-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=info'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devflow_net

volumes:
  postgres_data:
  devflow_db:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  devflow_net:
    driver: bridge
