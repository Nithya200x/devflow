apiVersion: v1
kind: ConfigMap
metadata:
  name: devflow-grafana-dashboard
  namespace: devflow-prod
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: devflow
data:
  devflow-dashboard.json: |
    {
      "title": "DevFlow Overview",
      "uid": "devflow-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Available Targets",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(up{job=~\".*devflow.*\"})",
              "legendFormat": "up"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Container Restarts",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"devflow-prod\", container=\"devflow-app\"}[10m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
