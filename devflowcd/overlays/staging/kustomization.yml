apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devflow-staging
resources:
  - ../../base
images:
  - name: nithya200x/devflow-app
    newName: nithya200x/devflow-app
    newTag: staging
patches:
  - target:
      kind: Namespace
      name: devflow
    patch: |-
      - op: replace
        path: /metadata/name
        value: devflow-staging
  - target:
      kind: Ingress
      name: devflow-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.devflow.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.devflow.example.com
