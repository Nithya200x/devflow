apiVersion: apps/v1
kind: Deployment
metadata:
  name: devflow-deployment
  namespace: devflow
  labels:
    app.kubernetes.io/name: devflow
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devflow
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devflow
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: devflow-app
          image: nithya200x/devflow-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: APP_NAME
              value: DevFlow
            - name: APP_VERSION
              value: latest
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
