global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'devflow-backend'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:5000']
        labels:
          service: 'devflow-backend'
          environment: 'docker-compose'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
