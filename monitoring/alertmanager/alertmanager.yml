global:
  resolve_timeout: 5m
  slack_api_url: ''
  smtp_smarthost: ''
  smtp_from: ''
  smtp_auth_username: ''
  smtp_auth_password: ''

route:
  receiver: 'devflow-backend'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m
  routes:
    - receiver: 'devflow-backend'
      match:
        severity: critical
      repeat_interval: 2m
    - receiver: 'devflow-backend'
      match:
        severity: warning
      repeat_interval: 5m

receivers:
  - name: 'devflow-backend'
    webhook_configs:
      - url: 'http://backend:5000/api/v1/alertmanager/webhook'
        send_resolved: true
        http_config:
          timeout: 10s

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'namespace']
