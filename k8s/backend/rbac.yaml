apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: devflow

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backend-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backend-reader-binding
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: devflow
roleRef:
  kind: ClusterRole
  name: backend-reader
  apiGroup: rbac.authorization.k8s.io
